      MCACHE_RAFT_DATA_DIR: /var/lib/mcache/raft
      MCACHE_CLUSTER_PEERS: node-1@mcache1:7001@http://127.0.0.1:18081,node-2@mcache2:7002@http://127.0.0.1:18082,node-3@mcache3:7003@http://127.0.0.1:18083
    ports:
